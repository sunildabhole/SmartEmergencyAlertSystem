<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SEAS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div id="toast-container"></div>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-logo"><i class="fa-solid fa-shield-halved"></i> SEAS</div>
            <h2>Create Account</h2>

            <!-- ── STEP 1: Registration form ── -->
            <div id="step-register">
                <p>Register to send SOS alerts</p>
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="input-group">
                    <label for="phone">Phone (optional)</label>
                    <input type="tel" id="phone" placeholder="+91 9876543210">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="Create a password (min 6 chars)">
                </div>
                <button id="registerBtn" class="btn btn-primary btn-block">
                    Register &amp; Get OTP <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>

            <!-- ── STEP 2: OTP verification ── -->
            <div id="step-verify" class="hidden">
                <p class="step-label">
                    <i class="fa-solid fa-envelope-circle-check"></i>
                    We sent a 6-digit code to <strong id="regEmailLabel"></strong>
                </p>
                <div class="otp-input-row">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                </div>
                <p id="regOtpTimer" class="otp-timer"></p>
                <button id="verifyRegBtn" class="btn btn-primary btn-block">
                    Verify &amp; Activate <i class="fa-solid fa-check-circle"></i>
                </button>
                <button id="resendRegOtpBtn" class="btn btn-outline btn-block hidden">
                    Resend OTP <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>

            <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
