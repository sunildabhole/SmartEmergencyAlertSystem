<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SEAS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div id="toast-container"></div>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-logo"><i class="fa-solid fa-shield-halved"></i> SEAS</div>
            <h2>Welcome Back</h2>

            <!-- ── STEP 1: Email entry ── -->
            <div id="step-email">
                <p class="step-label"><i class="fa-solid fa-envelope"></i> Enter your registered email</p>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com">
                </div>
                <button id="requestOtpBtn" class="btn btn-primary btn-block">
                    Send OTP <i class="fa-solid fa-paper-plane"></i>
                </button>
                <div class="auth-divider"><span>or</span></div>
                <button id="usePasswordBtn" class="btn btn-outline btn-block">
                    Login with Password
                </button>
            </div>

            <!-- ── STEP 2a: OTP entry ── -->
            <div id="step-otp" class="hidden">
                <p class="step-label">
                    <i class="fa-solid fa-key"></i>
                    Enter the 6-digit OTP sent to <strong id="otpEmailLabel"></strong>
                </p>
                <div class="otp-input-row">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]">
                </div>
                <p id="otpTimer" class="otp-timer"></p>
                <button id="verifyOtpBtn" class="btn btn-primary btn-block">
                    Verify &amp; Login <i class="fa-solid fa-right-to-bracket"></i>
                </button>
                <button id="resendOtpBtn" class="btn btn-outline btn-block hidden">
                    Resend OTP <i class="fa-solid fa-rotate-right"></i>
                </button>
                <button id="backToEmailBtn" class="btn btn-ghost btn-block">
                    <i class="fa-solid fa-arrow-left"></i> Change email
                </button>
            </div>

            <!-- ── STEP 2b: Password entry (legacy) ── -->
            <div id="step-password" class="hidden">
                <p class="step-label"><i class="fa-solid fa-lock"></i> Enter your password</p>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
                <button id="loginBtn" class="btn btn-primary btn-block">
                    Login <i class="fa-solid fa-right-to-bracket"></i>
                </button>
                <button id="backToEmailBtn2" class="btn btn-ghost btn-block">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
            </div>

            <p class="auth-footer">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
